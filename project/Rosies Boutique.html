<!-- Supabase JS (for admin dashboard product CRUD + auth) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* ===== SUPABASE CONFIG =====
     Paste your project credentials below (Project Settings → API in Supabase dashboard).
     Then create a table `products` with columns:
       id          uuid    primary key default gen_random_uuid()
       name        text
       category    text     -- loại hoa (Bouquets, Dried, Gifts, ...)
       event       text     -- dịp (Wedding, Birthday, Mother's Day, ...)
       price       numeric
       image_url   text
       description text
       created_at  timestamptz default now()

     Until configured, the admin dashboard falls back to localStorage so you can
     still preview the UI. ============================ */
  window.__SUPABASE_URL = "";       // e.g. "https://xxxxx.supabase.co"
  window.__SUPABASE_ANON_KEY = "";  // your public anon key

  /* Demo admin credentials used only when Supabase is NOT configured */
  window.__DEMO_ADMIN_EMAIL = "admin@rosie.co";
  window.__DEMO_ADMIN_PASSWORD = "rosie2026";
</script>
